name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # update wiki with coverage badge + report
      pull-requests: write   # post coverage diff comments on PRs
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint (gofmt + vet)
        run: make lint

      - name: Test
        run: go test -race -timeout 60s -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage report
        uses: ncruces/go-coverage-report@v0
        with:
          coverage-file: coverage.out
          chart: true
        continue-on-error: true   # non-fatal: wiki may not exist on first run
