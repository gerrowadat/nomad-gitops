syntax = "proto3";

package nomad_botherer.v1;

option go_package = "github.com/gerrowadat/nomad-botherer/internal/grpcapi";

// NomadBotherer allows operators to query drift state and trigger refreshes.
service NomadBotherer {
  // GetDiffs returns the current set of job diffs detected between git and Nomad.
  rpc GetDiffs(GetDiffsRequest) returns (GetDiffsResponse);

  // GetSelectedJobs returns all jobs that matched the configured selection
  // criteria during the last check, together with the reason each was included.
  rpc GetSelectedJobs(GetSelectedJobsRequest) returns (GetSelectedJobsResponse);

  // GetStatus returns git watcher status (last commit, last update time).
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

  // TriggerRefresh causes an immediate git pull and diff check.
  rpc TriggerRefresh(TriggerRefreshRequest) returns (TriggerRefreshResponse);

  // GetVersion returns the server build version, commit hash, and build date.
  rpc GetVersion(GetVersionRequest) returns (GetVersionResponse);
}

message GetDiffsRequest {}

message GetDiffsResponse {
  repeated JobDiff diffs = 1;
  // RFC3339 timestamp of the last diff check.
  string last_check_time = 2;
  // Git commit hash that was current during the last diff check.
  string last_commit = 3;
}

message JobDiff {
  string job_id = 1;
  // Path to the HCL file; empty when diff_type is missing_from_hcl.
  string hcl_file = 2;
  // One of: modified, missing_from_nomad, missing_from_hcl.
  string diff_type = 3;
  // Human-readable summary of the diff (nomad plan output excerpt).
  string detail = 4;
}

message GetSelectedJobsRequest {}

message GetSelectedJobsResponse {
  repeated SelectedJob jobs = 1;
  // RFC3339 timestamp of the last diff check.
  string last_check_time = 2;
  // Git commit hash that was current during the last diff check.
  string last_commit = 3;
}

// SelectedJob records a job that matched the configured selection criteria.
message SelectedJob {
  string job_id = 1;
  // One of: glob, meta, both.
  string selection_reason = 2;
}

message GetStatusRequest {}

message GetStatusResponse {
  string last_commit = 1;
  // RFC3339 timestamp of the last successful git fetch.
  string last_update_time = 2;
}

message TriggerRefreshRequest {}

message TriggerRefreshResponse {
  string message = 1;
}

message GetVersionRequest {}

message GetVersionResponse {
  // Semver tag or "dev" when built without -ldflags.
  string version = 1;
  // Git commit hash at build time, or "unknown".
  string commit = 2;
  // RFC3339 build timestamp, or "unknown".
  string build_date = 3;
}
